<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - Gunnar Hostetler</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #f5f5f7;
        color: #1d1d1f;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 24px;
      }
      .container {
        max-width: 480px;
      }
      h1 {
        font-size: 6rem;
        font-weight: 800;
        background: linear-gradient(135deg, #00b8d4, #26c6da, #4dd0e1);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
      }
      h2 {
        font-size: 1.5rem;
        margin: 16px 0 8px;
      }
      p {
        color: #86868b;
        margin-bottom: 24px;
      }
      a {
        display: inline-block;
        padding: 12px 28px;
        background: linear-gradient(135deg, #00b8d4, #26c6da);
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      a:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 184, 212, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Page not found</h2>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a href="/">Back to Portfolio</a>
    </div>
  </body>
</html>
